<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NetGamer MX | Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .box { background: #1a1a1a; padding: 40px; border-radius: 15px; width: 320px; text-align: center; border: 1px solid #333; }
        input { width: 100%; margin: 10px 0; padding: 12px; border-radius: 5px; border: 1px solid #444; background: #000; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #ff9900; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>NetGamer MX</h2>
        <input type="email" id="email" placeholder="Correo electrónico">
        <input type="password" id="password" placeholder="Contraseña">
        <button onclick="authAction('signup')">Registrarse</button>
        <button onclick="authAction('login')" style="background: #333;">Iniciar Sesión</button>
    </div>

    <script>
        // 2. Inicializar cliente UNA SOLA VEZ
        const supabase = supabase.createClient(
            'https://meiwuluwrdjszxeyoqtt.supabase.co', 
            'sb_publishable_gZgGIamNJqf8ir8vvt1OTw_bJ-rosi4'
        );
        
        // 3. La función ahora es accesible porque está en el mismo bloque
        async function authAction(type) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            let result;
            if (type === 'signup') {
                result = await supabase.auth.signUp({ email, password });
            } else {
                result = await supabase.auth.signInWithPassword({ email, password });
            }

            const { data, error } = result;
            
            if (error) {
                alert(error.message);
            } else {
                if (type === 'signup') {
                    alert("¡Registro exitoso! Revisa tu correo.");
                } else {
                    alert("¡Bienvenido!");
                    window.location.href = 'ofertas.html';
                }
            }
        }
    </script>
</body>
</html>
